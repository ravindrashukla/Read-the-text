<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Read Aloud Player</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --primary: #0f3460;
    --accent: #e94560;
    --text: #eee;
    --muted: #888;
    --highlight: rgba(233,69,96,0.15);
    --done: rgba(255,255,255,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--surface);
    padding: 16px 24px;
    border-bottom: 2px solid var(--primary);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  header h1 {
    font-size: 1.4rem;
    font-weight: 600;
    color: var(--accent);
    white-space: nowrap;
  }

  .header-controls {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    flex: 1;
    justify-content: flex-end;
  }

  select, button, input[type="file"] {
    font-family: inherit;
    font-size: 0.85rem;
    border: 1px solid var(--primary);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  select:hover, button:hover { border-color: var(--accent); }
  button:active { transform: scale(0.96); }

  .btn-accent {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }

  .btn-accent:hover { opacity: 0.85; }

  .upload-area {
    background: var(--surface);
    border: 2px dashed var(--primary);
    border-radius: 12px;
    padding: 40px;
    text-align: center;
    margin: 20px;
    transition: border-color 0.3s;
  }

  .upload-area.dragover {
    border-color: var(--accent);
    background: var(--highlight);
  }

  .upload-area p { margin-bottom: 12px; color: var(--muted); }

  .upload-btns {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 16px;
  }

  .main-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .sections-nav {
    width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--primary);
    overflow-y: auto;
    padding: 12px 0;
    flex-shrink: 0;
  }

  .sections-nav.hidden { display: none; }

  .sections-nav h3 {
    padding: 8px 16px;
    font-size: 0.75rem;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .sections-nav button {
    display: block;
    width: 100%;
    text-align: left;
    padding: 8px 16px;
    border: none;
    border-radius: 0;
    background: transparent;
    color: var(--text);
    font-size: 0.85rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sections-nav button:hover { background: var(--primary); }
  .sections-nav button.active { background: var(--accent); color: #fff; }

  .content-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }

  .paragraph {
    padding: 10px 16px;
    margin-bottom: 4px;
    border-radius: 6px;
    cursor: pointer;
    line-height: 1.7;
    font-size: 1.05rem;
    transition: all 0.3s;
  }

  .paragraph:hover { background: rgba(255,255,255,0.05); }
  .paragraph.reading { background: var(--highlight); border-left: 3px solid var(--accent); }
  .paragraph.done { color: var(--done); }

  .paragraph.section-heading {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--accent);
    margin-top: 20px;
  }

  .player-bar {
    background: var(--surface);
    border-top: 2px solid var(--primary);
    padding: 12px 24px;
  }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .progress-bar {
    flex: 1;
    height: 6px;
    background: var(--primary);
    border-radius: 3px;
    cursor: pointer;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.3s;
  }

  .progress-text { font-size: 0.8rem; color: var(--muted); min-width: 60px; }

  .controls-row {
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .ctrl-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    padding: 0;
  }

  .ctrl-btn.play-btn {
    width: 52px;
    height: 52px;
    font-size: 1.3rem;
    background: var(--accent);
    border-color: var(--accent);
  }

  .status-text {
    font-size: 0.8rem;
    color: var(--muted);
    text-align: center;
    margin-top: 6px;
  }

  .hidden { display: none !important; }

  @media (max-width: 700px) {
    .sections-nav { width: 160px; }
    .content-area { padding: 12px; }
    .paragraph { font-size: 0.95rem; }
  }
</style>
</head>
<body>

<!-- Upload Screen -->
<div id="uploadScreen">
  <header>
    <h1>Read Aloud Player</h1>
  </header>
  <div class="upload-area" id="dropZone">
    <p style="font-size:2rem;">📄</p>
    <p>Drop a file here or choose an option below</p>
    <p style="font-size:0.85rem;">Supports: PDF, TXT, or paste text directly</p>
    <div class="upload-btns">
      <button class="btn-accent" onclick="document.getElementById('fileInput').click()">Upload PDF / TXT</button>
      <button class="btn-accent" onclick="showPasteMode()">Paste Text</button>
    </div>
    <input type="file" id="fileInput" accept=".pdf,.txt,.text,.md" style="display:none">
  </div>
  <div id="pasteArea" class="hidden" style="margin:0 20px 20px;">
    <textarea id="pasteBox" rows="12" style="width:100%;background:var(--bg);color:var(--text);border:1px solid var(--primary);border-radius:8px;padding:16px;font-size:1rem;resize:vertical;font-family:inherit;" placeholder="Paste your text here..."></textarea>
    <div style="margin-top:10px;display:flex;gap:10px;">
      <button class="btn-accent" onclick="loadPastedText()">Load Text</button>
      <button onclick="hidePasteMode()">Cancel</button>
    </div>
  </div>
</div>

<!-- Player Screen -->
<div id="playerScreen" class="hidden" style="display:none;flex-direction:column;height:100vh;">
  <header>
    <h1>Read Aloud Player</h1>
    <div class="header-controls">
      <label style="font-size:0.8rem;color:var(--muted);">Voice:</label>
      <select id="voiceSelect"></select>
      <label style="font-size:0.8rem;color:var(--muted);">Speed:</label>
      <select id="speedSelect">
        <option value="0.75">0.75x</option>
        <option value="1" selected>1x</option>
        <option value="1.25">1.25x</option>
        <option value="1.5">1.5x</option>
        <option value="1.75">1.75x</option>
        <option value="2">2x</option>
      </select>
      <button onclick="loadNewFile()" title="Load a different file">New File</button>
    </div>
  </header>

  <div class="main-layout">
    <nav class="sections-nav" id="sectionsNav">
      <h3>Sections</h3>
    </nav>
    <div class="content-area" id="contentArea"></div>
  </div>

  <div class="player-bar">
    <div class="progress-row">
      <span class="progress-text" id="progressCurrent">0 / 0</span>
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
    <div class="controls-row">
      <button class="ctrl-btn" onclick="prevParagraph()" title="Previous (←)">⏮</button>
      <button class="ctrl-btn play-btn" id="playBtn" onclick="togglePlay()" title="Play/Pause (Space)">▶</button>
      <button class="ctrl-btn" onclick="stopReading()" title="Stop (Esc)">■</button>
      <button class="ctrl-btn" onclick="nextParagraph()" title="Next (→)">⏭</button>
    </div>
    <div class="status-text" id="statusText">Ready — load a document to begin</div>
  </div>
</div>

<script>
  // PDF.js worker
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  // State
  let paragraphs = [];
  let sections = [];
  let currentIndex = -1;
  let isPlaying = false;
  let isPaused = false;
  let synth = window.speechSynthesis;
  let voices = [];
  let selectedVoice = null;

  // DOM
  const uploadScreen = document.getElementById('uploadScreen');
  const playerScreen = document.getElementById('playerScreen');
  const contentArea = document.getElementById('contentArea');
  const sectionsNav = document.getElementById('sectionsNav');
  const playBtn = document.getElementById('playBtn');
  const progressFill = document.getElementById('progressFill');
  const progressCurrent = document.getElementById('progressCurrent');
  const statusText = document.getElementById('statusText');
  const voiceSelect = document.getElementById('voiceSelect');
  const speedSelect = document.getElementById('speedSelect');
  const progressBar = document.getElementById('progressBar');

  // Voices
  function loadVoices() {
    voices = synth.getVoices().filter(v => v.lang.startsWith('en'));
    voiceSelect.innerHTML = '';
    voices.forEach((v, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `${v.name} (${v.lang})`;
      if (v.name.includes('Google US English') || v.name.includes('Microsoft David')) opt.selected = true;
      voiceSelect.appendChild(opt);
    });
    if (voices.length === 0) {
      const all = synth.getVoices();
      voices = all;
      all.forEach((v, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `${v.name} (${v.lang})`;
        voiceSelect.appendChild(opt);
      });
    }
  }

  synth.onvoiceschanged = loadVoices;
  loadVoices();

  voiceSelect.addEventListener('change', () => {
    selectedVoice = voices[voiceSelect.value] || null;
  });

  // File handling
  document.getElementById('fileInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    await processFile(file);
  });

  const dropZone = document.getElementById('dropZone');
  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', async (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) await processFile(file);
  });

  async function processFile(file) {
    statusText.textContent = 'Loading file...';
    let text = '';
    if (file.name.toLowerCase().endsWith('.pdf')) {
      text = await extractPdfText(file);
    } else {
      text = await file.text();
    }
    loadText(text);
  }

  async function extractPdfText(file) {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let fullText = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      const pageText = content.items.map(item => item.str).join(' ');
      fullText += pageText + '\n\n';
    }
    return fullText;
  }

  function showPasteMode() {
    document.getElementById('pasteArea').classList.remove('hidden');
    document.getElementById('pasteBox').focus();
  }

  function hidePasteMode() {
    document.getElementById('pasteArea').classList.add('hidden');
  }

  function loadPastedText() {
    const text = document.getElementById('pasteBox').value.trim();
    if (!text) return;
    loadText(text);
  }

  function loadNewFile() {
    stopReading();
    playerScreen.style.display = 'none';
    playerScreen.classList.add('hidden');
    uploadScreen.style.display = '';
    uploadScreen.classList.remove('hidden');
    document.getElementById('fileInput').value = '';
  }

  // Text processing
  function loadText(text) {
    paragraphs = [];
    sections = [];
    contentArea.innerHTML = '';

    // Split into paragraphs
    const raw = text.split(/\n\s*\n/).map(p => p.trim()).filter(p => p.length > 0);

    // Detect section headings (all caps, short lines, or lines ending with colon that are short)
    raw.forEach((p, i) => {
      const isHeading = (p.length < 100 && (
        p === p.toUpperCase() && /[A-Z]/.test(p) ||
        /^#{1,6}\s/.test(p) ||
        /^(Section|Chapter|Part)\s+\d/i.test(p)
      ));

      const el = document.createElement('div');
      el.className = 'paragraph' + (isHeading ? ' section-heading' : '');
      el.textContent = p.replace(/^#{1,6}\s/, '');
      el.dataset.index = paragraphs.length;
      el.addEventListener('click', () => jumpTo(parseInt(el.dataset.index)));
      contentArea.appendChild(el);

      if (isHeading) {
        sections.push({ index: paragraphs.length, title: p.replace(/^#{1,6}\s/, '').substring(0, 40) });
      }

      paragraphs.push({ text: p.replace(/^#{1,6}\s/, ''), el });
    });

    // Build section nav
    buildSectionNav();
    updateProgress();

    // Show player
    uploadScreen.style.display = 'none';
    uploadScreen.classList.add('hidden');
    playerScreen.classList.remove('hidden');
    playerScreen.style.display = 'flex';

    statusText.textContent = `Loaded ${paragraphs.length} paragraphs — press Play to start`;
  }

  function buildSectionNav() {
    // Clear existing buttons
    const existing = sectionsNav.querySelectorAll('button');
    existing.forEach(b => b.remove());

    if (sections.length === 0) {
      sectionsNav.classList.add('hidden');
      return;
    }

    sectionsNav.classList.remove('hidden');
    sections.forEach(sec => {
      const btn = document.createElement('button');
      btn.textContent = sec.title;
      btn.addEventListener('click', () => jumpTo(sec.index));
      sectionsNav.appendChild(btn);
    });
  }

  // Playback
  function togglePlay() {
    if (isPlaying && !isPaused) {
      pause();
    } else if (isPaused) {
      resume();
    } else {
      play();
    }
  }

  function play() {
    if (paragraphs.length === 0) return;
    if (currentIndex < 0) currentIndex = 0;
    isPlaying = true;
    isPaused = false;
    playBtn.textContent = '⏸';
    speakCurrent();
  }

  function pause() {
    synth.pause();
    isPaused = true;
    playBtn.textContent = '▶';
    statusText.textContent = 'Paused';
  }

  function resume() {
    synth.resume();
    isPaused = false;
    playBtn.textContent = '⏸';
    statusText.textContent = 'Reading...';
  }

  function stopReading() {
    synth.cancel();
    isPlaying = false;
    isPaused = false;
    playBtn.textContent = '▶';
    clearHighlights();
    statusText.textContent = 'Stopped';
  }

  function speakCurrent() {
    if (currentIndex >= paragraphs.length) {
      isPlaying = false;
      playBtn.textContent = '▶';
      statusText.textContent = 'Finished!';
      return;
    }

    synth.cancel();

    const para = paragraphs[currentIndex];
    highlightCurrent();
    updateProgress();
    scrollToCurrentParagraph();

    const utterance = new SpeechSynthesisUtterance(para.text);
    utterance.rate = parseFloat(speedSelect.value);
    const vi = voiceSelect.value;
    if (voices[vi]) utterance.voice = voices[vi];

    utterance.onend = () => {
      if (!isPlaying) return;
      para.el.classList.remove('reading');
      para.el.classList.add('done');
      currentIndex++;
      speakCurrent();
    };

    utterance.onerror = (e) => {
      if (e.error === 'canceled') return;
      console.error('Speech error:', e);
      statusText.textContent = 'Speech error — trying next paragraph';
      currentIndex++;
      if (isPlaying) speakCurrent();
    };

    statusText.textContent = `Reading paragraph ${currentIndex + 1} of ${paragraphs.length}`;
    synth.speak(utterance);

    // Chrome bug workaround: speech stops after ~15 seconds
    if (/Chrome/.test(navigator.userAgent) && !/Edge/.test(navigator.userAgent)) {
      clearInterval(window._chromeWorkaround);
      window._chromeWorkaround = setInterval(() => {
        if (synth.speaking && !synth.paused) {
          synth.pause();
          synth.resume();
        }
      }, 10000);
    }
  }

  function jumpTo(index) {
    const wasPlaying = isPlaying;
    synth.cancel();
    clearHighlights();
    currentIndex = index;
    if (wasPlaying || true) {
      isPlaying = true;
      isPaused = false;
      playBtn.textContent = '⏸';
      speakCurrent();
    }
  }

  function prevParagraph() {
    if (currentIndex > 0) {
      jumpTo(currentIndex - 1);
    }
  }

  function nextParagraph() {
    if (currentIndex < paragraphs.length - 1) {
      jumpTo(currentIndex + 1);
    }
  }

  function highlightCurrent() {
    paragraphs.forEach(p => p.el.classList.remove('reading'));
    if (currentIndex >= 0 && currentIndex < paragraphs.length) {
      paragraphs[currentIndex].el.classList.add('reading');
    }
    // Update section nav
    sectionsNav.querySelectorAll('button').forEach((btn, i) => {
      btn.classList.toggle('active',
        sections[i] && currentIndex >= sections[i].index &&
        (i + 1 >= sections.length || currentIndex < sections[i + 1].index)
      );
    });
  }

  function clearHighlights() {
    paragraphs.forEach(p => {
      p.el.classList.remove('reading');
      p.el.classList.remove('done');
    });
  }

  function scrollToCurrentParagraph() {
    if (currentIndex >= 0 && currentIndex < paragraphs.length) {
      paragraphs[currentIndex].el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  function updateProgress() {
    const total = paragraphs.length;
    const current = Math.max(0, currentIndex + 1);
    progressCurrent.textContent = `${currentIndex < 0 ? 0 : current} / ${total}`;
    progressFill.style.width = total > 0 ? `${(current / total) * 100}%` : '0%';
  }

  // Progress bar click
  progressBar.addEventListener('click', (e) => {
    const rect = progressBar.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    const target = Math.floor(pct * paragraphs.length);
    jumpTo(Math.max(0, Math.min(target, paragraphs.length - 1)));
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;

    switch (e.code) {
      case 'Space':
        e.preventDefault();
        togglePlay();
        break;
      case 'ArrowRight':
        e.preventDefault();
        nextParagraph();
        break;
      case 'ArrowLeft':
        e.preventDefault();
        prevParagraph();
        break;
      case 'Escape':
        e.preventDefault();
        stopReading();
        break;
    }
  });
</script>

</body>
</html>
